hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  gen_batch_size: ${data.train_batch_size}
  # ========== [GRESO & Data 관련 추가 파라미터] ==========
  dynamic_filtering: True
  p_easy: 0.5
  p_hard: 0.5
  target_zero_variance: 0.25
  default_br_size: 192
  min_p: 0.05
  max_p: 0.95
  beta: 1.25  # 코드에서 참조할 수 있으므로 유지
  filter_overlong_prompts: True
  # =====================================================

reward_model:
  reward_manager: dapo
  overlong_buffer: 
    enable: False
    len: 0
    penalty_factor: 0.0
    log: False

algorithm:
  filter_groups:
    _target_: verl.trainer.config.FilterGroupsConfig
    enable: True 
    metric: acc 
    max_num_gen_batches: 0

trainer:
  project_name: verl-dapo
