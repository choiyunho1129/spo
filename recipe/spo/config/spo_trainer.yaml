# the spo config will override default ppo_trainer.yaml

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

trainer:
  debug: false
  spo:
    enable: False
    mode: "stateful"  # stateful | baseline_only
    offline_values: null
    baseline_values: null
    missing_prompt: "error"  # error | default
    default_p_hat: 0.5
    weighted_sampling: True
    offline_N: 8
    rho:
      type: "kl"
      value: 0.875
      clip_lower: 0.875
